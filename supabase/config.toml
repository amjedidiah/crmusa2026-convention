project_id = "crmusa2026-convention"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Staff magic-link fallback must land on admin-sync (implicit flow reads hash here).
# Public registration uses app routes on the same origin; keep additional_redirect_urls for roots.
site_url = "http://127.0.0.1:3000/admin-sync.html"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3000/admin-sync.html",
  "http://localhost:3000",
  "http://localhost:3000/admin-sync.html",
]
jwt_expiry = 3600

[storage]
enabled = true
file_size_limit = "50MiB"
